site_name: vdu_controls
site_description: Manuals and user guides for vdu_controls
copyright: 2021-2026 Contributors to vdu_controls

theme:
  name: material
  custom_dir: overrides
  logo: assets/vdu_controls_light.svg
  favicon: assets/vdu_controls.svg
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.tabs.link
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

docs_dir: _build/mkdocs/input

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.blocks.admonition
  - attr_list

nav:
  - Home: index.md
  - Manual Page: manual.md
  - Semi-Auto Howto: assets/semi-auto-howto.md
  - Light-Meters Howto: assets/light-meters-howto.md
  - Downloads: /#downloads
  - Releases: https://github.com/digitaltrails/vdu_controls/releases
  - Source Code: https://github.com/digitaltrails/vdu_controls
  - License: LICENSE.md
