# Simple workflow for deploying MkDocs user manual to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          # MkDocs 2.0, the underlying framework of Material for MkDocs,
          # will introduce backward-incompatible changes
          # pip install mkdocs mkdocs-material
          pip install "mkdocs<2.0.0" "mkdocs-material<10.0.0"

      - name: Build MkDocs site
        run: |
          # Create manual folder if it doesn't exist
          mkdir -p manual
          
          # Copy README.md as the homepage
          cp README.md manual/index.md
          python3 utils/convert_alerts.py manual/index.md
          
          # Copy app help page as a starter manual (it's a md man page)
          cp src/vdu_controls/resources/docs/help.md manual/manual.md
          
          # Copy supporting folders
          cp -r screenshots manual/ 2>/dev/null || echo "No screenshots folder found"
          cp -r sample-scripts manual/
          cp -r LICENSE.md manual/

          
          # Copy mkdocs.yml configuration
          cp docs/mkdocs.yml ./mkdocs.yml
          
          # Get the icon and convert it to be OK on a dark header
          cp src/vdu_controls/resources/icons/app/vdu_controls.svg docs/manual/assets/
          sed -i 's/color:#232629;/color:#f3f3f3;/' docs/manual/assets/vdu_controls.svg
          
          # Build the site
          mkdocs build --site-dir _site
          
          # Add .nojekyll to prevent Jekyll processing
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
