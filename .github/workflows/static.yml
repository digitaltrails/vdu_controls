# Simple workflow for deploying MkDocs user manual to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material

      - name: Build MkDocs site
        run: |
          # Create manual folder if it doesn't exist
          mkdir -p manual
          
          # Copy README.md as the homepage
          cp README.md manual/index.md
          
          # Copy app help page
          cp src/vdu_controls/resources/docs/help.md manual/help.md
          
          # Copy supporting folders
          cp -r screenshots manual/ 2>/dev/null || echo "No screen-shots folder found"
          cp -r sample-scripts manual/
          cp -r LICENSE.md manual/

          
          # Copy mkdocs.yml configuration
          cp src/docs/mkdocs.yml ./mkdocs.yml
          
          # Build the site
          mkdocs build --site-dir _site
          
          # Add .nojekyll to prevent Jekyll processing
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
