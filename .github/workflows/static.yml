name: Deploy MkDocs User Manual to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material

      - name: Build site
        run: |
          # If you have mkdocs.yml in the root:
          mkdocs build --site-dir _site
          
          # If you want to use README.md as the homepage:
          # Create a docs folder and copy README.md there
          mkdir -p docs
          cp README.md docs/index.md
          cp -r screen-shots docs/
          
          # Create a minimal mkdocs.yml
          cat > mkdocs.yml << 'EOF'
          site_name: User Manual
          theme:
            name: material
            features:
              - navigation.sections
              - navigation.top
              - search.highlight
          EOF
          
          mkdocs build --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5# Simple workflow for deploying static content to GitHub Pages
